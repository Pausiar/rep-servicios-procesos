<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel - PSP Recovery Lab</title>
    <meta
      name="description"
      content="Entrenador practico de recuperacion para 2DAM PSP: Streams, Method References, AtomicReference, Concurrent Collections y ServerSockets."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="dashboard">
    <div class="app-shell">
      <aside class="side-panel" aria-label="Navegacion principal">
        <a class="brand" href="index.html" aria-label="Inicio">
          <span class="brand-mark">PSP</span>
          <span>
            <strong>Recovery Lab</strong>
            <small>Pau Silvestre</small>
          </span>
        </a>

        <nav class="main-nav" id="main-nav" aria-label="Secciones"></nav>

        <div class="side-card">
          <span class="mini-label">Examen</span>
          <strong>19/06/2026 - 10:00</strong>
          <span id="side-countdown">Calculando...</span>
        </div>

        <div class="side-links" id="side-links"></div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">2DAM - PSP · Recuperacion practica</p>
            <h1>Entrena codigo hasta que salga sin mirar</h1>
          </div>
          <div class="countdown-card" aria-live="polite">
            <span>Tiempo restante</span>
            <strong id="countdown">Calculando...</strong>
          </div>
        </header>

        <section class="focus-strip" aria-labelledby="focus-title">
          <img
            src="assets/recuperacion-psp-pau.png"
            alt="Tabla de recuperacion de PSP con los temas asignados a Pau Silvestre"
          />
          <div>
            <p class="eyebrow" id="focus-title">Objetivo real de Pau</p>
            <h2>Streams, Method Reference, AtomicReference, Concurrent Collections y ServerSockets.</h2>
            <div class="topic-chips" id="topic-chips"></div>
          </div>
        </section>

        <section class="view-panel" id="page-panel"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script>
(function () {
  var parts = location.pathname.split("/").filter(Boolean);
  var slugs = ["temario", "ejercicios", "patrones", "simulacro", "fallos", "index"];
  var last = parts[parts.length - 1] || "";
  var slug = last.replace(/\.html$/i, "");
  if (location.protocol !== "file:" && (/\.html$/i.test(last) || slugs.indexOf(slug) >= 0)) parts.pop();
  window.APP_ROOT = location.protocol === "file:" ? "" : parts.length ? "/" + parts.join("/") + "/" : "/";
  window.bootLoadScripts = function (files, i) {
    i = i || 0;
    if (i >= files.length) return;
    var tag = document.createElement("script");
    tag.src = APP_ROOT + files[i];
    tag.onload = function () { bootLoadScripts(files, i + 1); };
    tag.onerror = function () { bootLoadScripts(files, i + 1); };
    document.body.appendChild(tag);
  };
})();
    </script>
    <script>bootLoadScripts(["layout.js", "app.js"]);</script>
  </body>
</html>
